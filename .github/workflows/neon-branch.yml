name: Create/Delete Branch for Pull Request

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  pull-requests: write
  contents: read

jobs:
  setup:
    name: Setup
    outputs:
      branch: ${{ steps.branch_name.outputs.current_branch }}
    runs-on: ubuntu-latest
    steps:
      - name: Get branch name
        id: branch_name
        uses: tj-actions/branch-names@v8

  create_neon_branch:
    name: Create Neon Branch
    outputs:
      database_url_unpooled: ${{ steps.neon_cli.outputs.database_url_unpooled }}
      database_url_pooled: ${{ steps.neon_cli.outputs.database_url_pooled }}
    needs: setup
    if: |
      github.event_name == 'pull_request' && (
      github.event.action == 'synchronize'
      || github.event.action == 'opened'
      || github.event.action == 'reopened')
    runs-on: ubuntu-latest
    steps:
      - name: Get branch expiration date as an env variable (2 weeks from now)
        id: get_expiration_date
        run: echo "EXPIRES_AT=$(date -u --date '+14 days' +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Create Neon Branch
        id: create_neon_branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}
          expires_at: ${{ env.EXPIRES_AT }}

      - name: Get Connection Strings with Neon CLI
        id: neon_cli
        run: |
          # Install Neon CLI
          npm install -g neonctl
          
          # Get UNPOOLED connection string for migrations
          DB_URL_UNPOOLED=$(neonctl connection-string \
            --project-id ${{ vars.NEON_PROJECT_ID }} \
            --branch preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }})
          
          # Get POOLED connection string for Vercel
          DB_URL_POOLED=$(neonctl connection-string \
            --project-id ${{ vars.NEON_PROJECT_ID }} \
            --branch preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }} \
            --pooled)
          
          if [ -z "$DB_URL_UNPOOLED" ] || [ -z "$DB_URL_POOLED" ]; then
            echo "❌ Failed to get connection strings from neonctl"
            exit 1
          fi
          
          echo "database_url_unpooled=$DB_URL_UNPOOLED" >> $GITHUB_OUTPUT
          echo "database_url_pooled=$DB_URL_POOLED" >> $GITHUB_OUTPUT
          echo "✅ Got both unpooled and pooled connection strings"
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Database Connection
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "❌ DATABASE_URL is empty!"
            exit 1
          fi
          echo "✅ DATABASE_URL is set"
          echo "URL length: ${#DATABASE_URL}"
          echo "URL preview: ${DATABASE_URL:0:60}..."
        env:
          DATABASE_URL: ${{ steps.neon_cli.outputs.database_url_unpooled }}

      - name: Run Migrations
        run: pnpm db:migrate
        env:
          DATABASE_URL: ${{ steps.neon_cli.outputs.database_url_unpooled }}

      - name: Post Schema Diff Comment to PR
        run: |
          gh pr comment ${{ github.event.number }} \
            --body $'✅ **Database Schema**\n\nPreview database branch created and migrations ran successfully!\n\n**Branch:** `preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}`\n\nFor detailed schema changes, check the Neon console.'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Vercel Preview Environment Variables
        run: |
          # Install Vercel CLI
          npm install -g vercel@latest
          
          # Update DATABASE_URL for preview environment
          vercel env add DATABASE_URL \
            "${{ steps.neon_cli.outputs.database_url_pooled }}" \
            --scope wacanam \
            --project planner \
            --environment preview
          
          echo "✅ Updated Vercel preview environment DATABASE_URL"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

  delete_neon_branch:
    name: Delete Neon Branch
    needs: setup
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete Neon Branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}
