name: Create/Delete Branch for Pull Request

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  setup:
    name: Setup
    outputs:
      branch: ${{ steps.branch_name.outputs.current_branch }}
    runs-on: ubuntu-latest
    steps:
      - name: Get branch name
        id: branch_name
        uses: tj-actions/branch-names@v8

  create_neon_branch:
    name: Create Neon Branch
    outputs:
      db_url: ${{ steps.create_neon_branch.outputs.db_url }}
      db_url_with_pooler: ${{ steps.create_neon_branch.outputs.db_url_with_pooler }}
    needs: setup
    if: |
      github.event_name == 'pull_request' && (
      github.event.action == 'synchronize'
      || github.event.action == 'opened'
      || github.event.action == 'reopened')
    runs-on: ubuntu-latest
    steps:
      - name: Get branch expiration date as an env variable (2 weeks from now)
        id: get_expiration_date
        run: echo "EXPIRES_AT=$(date -u --date '+14 days' +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Create Neon Branch
        id: create_neon_branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}
          expires_at: ${{ env.EXPIRES_AT }}

      - name: Get Neon Branch Connection String
        id: neon_connection
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
          BRANCH_ID: ${{ steps.create_neon_branch.outputs.branch_id }}
        run: |
          echo "Using branch ID: $BRANCH_ID"
          
          if [ -z "$BRANCH_ID" ]; then
            echo "❌ No branch ID from create action"
            exit 1
          fi
          
          # Get connection string with pooler
          echo "Querying connection URI..."
          CONNECTION_JSON=$(curl -s -G \
            -H "Authorization: Bearer $NEON_API_KEY" \
            "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/connection_uri" \
            --data-urlencode "branch_id=$BRANCH_ID" \
            --data-urlencode "pooled=true")
          
          echo "Response: $CONNECTION_JSON"
          
          # Try multiple patterns to extract connection_uri
          DB_URL=$(echo "$CONNECTION_JSON" | grep -o '"connection_uri":"[^"]*' | head -1 | cut -d'"' -f4)
          
          if [ -z "$DB_URL" ]; then
            # Try alternative pattern
            DB_URL=$(echo "$CONNECTION_JSON" | grep -oP '(?<="connection_uri":")[^"]+' | head -1)
          fi
          
          if [ -z "$DB_URL" ]; then
            echo "❌ Failed to extract connection string"
            exit 1
          fi
          
          echo "database_url=$DB_URL" >> $GITHUB_OUTPUT
          echo "✅ Got pooled connection string (length: ${#DB_URL})"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Database Connection
        run: |
          echo "Database URL set: ${#DATABASE_URL}"
          echo "URL preview: ${DATABASE_URL:0:50}..."
        env:
          DATABASE_URL: ${{ steps.neon_connection.outputs.database_url }}

      - name: Run Migrations
        run: pnpm db:migrate
        env:
          DATABASE_URL: ${{ steps.neon_connection.outputs.database_url }}

      - name: Post Schema Diff Comment to PR
        uses: neondatabase/schema-diff-action@v1
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          compare_branch: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}

  delete_neon_branch:
    name: Delete Neon Branch
    needs: setup
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete Neon Branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}
